apiVersion: apps/v1
kind: Deployment
metadata:
  name: awesome-fish
  labels:
    app: awesome-fish
spec:
  replicas: 1
  selector:
    matchLabels:
      app: awesome-fish
  template:
    metadata:
      labels:
        app: awesome-fish
    spec:
      containers:
        - name: awesome-fish
          image: nginx:1.27
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: awesome-fish
spec:
  selector:
    app: awesome-fish
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
